name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Build site (production settings)
        run: uv run invoke preview

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known_hosts
        run: echo "${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: ssh -p 2244 -v -o StrictHostKeyChecking=yes websezrvz_3hx63t@schneebrenner.de "echo connected"

      - name: Deploy via rsync
        run: |
          rsync --delete --exclude ".DS_Store" -pthrvz -c \
            -e "ssh -p 2244 -o StrictHostKeyChecking=yes" \
            output/ \
            websezrvz_3hx63t@schneebrenner.de:/home/websezrvz/html/schneebrenner
